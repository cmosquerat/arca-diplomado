<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C82B40"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B1525"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <style>
      .label { font-family: "Fira Sans", "Arial", sans-serif; font-size: 20px; font-weight: 700; fill: white; }
      .sub { font-family: "Fira Sans", "Arial", sans-serif; font-size: 14px; font-weight: 500; fill: #6B7280; }
      .arrow-label { font-family: "Fira Sans", "Arial", sans-serif; font-size: 17px; font-weight: 600; fill: #6B1525; }
      .small-note { font-family: "Fira Sans", "Arial", sans-serif; font-size: 15px; font-weight: 500; fill: #6B7280; }
    </style>
  </defs>

  <rect x="70" y="70" rx="16" ry="16" width="200" height="84" fill="#6B1525"/>
  <text x="170" y="112" text-anchor="middle" class="label">Humano</text>
  <text x="170" y="135" text-anchor="middle" class="sub" fill="#F5F5F5">define el problema</text>

  <rect x="330" y="70" rx="16" ry="16" width="230" height="84" fill="#D85C6E"/>
  <text x="445" y="112" text-anchor="middle" class="label">Instruccion / Prompt</text>
  <text x="445" y="135" text-anchor="middle" class="sub" fill="#F5F5F5">que hacer y con que datos</text>

  <rect x="620" y="70" rx="16" ry="16" width="180" height="84" fill="#C82B40"/>
  <text x="710" y="112" text-anchor="middle" class="label">Agente IA</text>
  <text x="710" y="135" text-anchor="middle" class="sub" fill="#F5F5F5">ejecuta</text>

  <rect x="860" y="70" rx="16" ry="16" width="210" height="84" fill="#A31545"/>
  <text x="965" y="112" text-anchor="middle" class="label">Output Generado</text>
  <text x="965" y="135" text-anchor="middle" class="sub" fill="#F5F5F5">codigo, reporte o analisis</text>

  <line x1="270" y1="112" x2="330" y2="112" stroke="#C82B40" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="300" y="100" text-anchor="middle" class="arrow-label">define</text>

  <line x1="560" y1="112" x2="620" y2="112" stroke="#C82B40" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="590" y="100" text-anchor="middle" class="arrow-label">envia</text>

  <line x1="800" y1="112" x2="860" y2="112" stroke="#C82B40" stroke-width="4" marker-end="url(#arrow-red)"/>
  <text x="830" y="100" text-anchor="middle" class="arrow-label">genera</text>

  <rect x="410" y="250" rx="18" ry="18" width="320" height="92" fill="#F5F5F5" stroke="#6B1525" stroke-width="3"/>
  <text x="570" y="290" text-anchor="middle" style="font-family:'Fira Sans','Arial',sans-serif;font-size:22px;font-weight:800;fill:#6B1525;">Validacion Humana</text>
  <text x="570" y="316" text-anchor="middle" style="font-family:'Fira Sans','Arial',sans-serif;font-size:16px;font-weight:500;fill:#6B7280;">audita la logica, corrige y decide</text>

  <path d="M 965 154 L 965 220 L 570 220 L 570 250" stroke="#6B1525" stroke-width="4" fill="none" marker-end="url(#arrow-dark)"/>
  <text x="785" y="208" text-anchor="middle" class="arrow-label">revisa</text>

  <rect x="220" y="410" rx="14" ry="14" width="210" height="72" fill="#16A34A"/>
  <text x="325" y="452" text-anchor="middle" class="label">A Produccion</text>

  <rect x="710" y="410" rx="14" ry="14" width="210" height="72" fill="#EA580C"/>
  <text x="815" y="452" text-anchor="middle" class="label">Ajusta / Itera</text>

  <path d="M 505 342 L 380 410" stroke="#16A34A" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="420" y="365" text-anchor="middle" class="arrow-label">si esta correcto</text>

  <path d="M 635 342 L 760 410" stroke="#EA580C" stroke-width="4" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="716" y="365" text-anchor="middle" class="arrow-label">si requiere ajuste</text>

  <path d="M 815 410 L 815 365 L 445 365 L 445 154" stroke="#EA580C" stroke-width="3" stroke-dasharray="10 8" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="640" y="353" text-anchor="middle" class="arrow-label">nueva instruccion</text>
</svg>
